version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/model.pth:/app/model.pth
      - ./backend/classes.txt:/app/classes.txt
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
